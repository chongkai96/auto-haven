name: Daily inventory crawl

# Crawls the Auto Haven sgcarmart dealer listing once a day, downloads any new
# car photos, and commits the refreshed data back to the repo.
on:
  schedule:
    # 01:00 UTC daily = 09:00 Singapore time
    - cron: "0 1 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run crawler
        run: node scripts/crawl.mjs

      - name: Commit updated inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data public/cars
          if git diff --cached --quiet; then
            echo "No inventory changes today."
          else
            git commit -m "chore: daily inventory refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
